version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: adukes-kitchen-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: adukes_kitchen_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - adukes-network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: adukes-kitchen-backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/adukes_kitchen_db
      - DB_NAME=adukes_kitchen_db
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
    networks:
      - adukes-network
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: adukes-kitchen-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      - WDS_SOCKET_PORT=0
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - adukes-network
    stdin_open: true
    tty: true

volumes:
  mongodb_data:
    driver: local

networks:
  adukes-network:
    driver: bridge